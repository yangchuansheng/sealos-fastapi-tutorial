apiVersion: batch/v1
kind: Job
metadata:
  name: sealos-fastapi-migration
  labels:
    app.kubernetes.io/name: sealos-fastapi-migration
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sealos-fastapi-migration
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: ghcr.io/yangchuansheng/sealos-fastapi-tutorial:stage-2-postgresql
          workingDir: /app
          command:
            - alembic
            - upgrade
            - head
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sealos-fastapi-postgresql
                  key: url
