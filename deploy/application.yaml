apiVersion: v1
kind: ConfigMap
metadata:
  name: __APP_NAME__
  labels:
    app.kubernetes.io/name: __APP_NAME__
    tutorial.sealos.io/run-id: __RUN_ID__
data:
  logging.json: |
    {
      "version": 1,
      "disable_existing_loggers": false,
      "formatters": {
        "default": {
          "format": "%(levelname)s: %(message)s"
        },
        "access": {
          "format": "%(levelname)s: %(client_addr)s - %(request_line)s %(status_code)s"
        }
      },
      "handlers": {
        "default": {
          "class": "logging.StreamHandler",
          "formatter": "default",
          "stream": "ext://sys.stdout"
        },
        "access": {
          "class": "logging.StreamHandler",
          "formatter": "access",
          "stream": "ext://sys.stdout"
        }
      },
      "loggers": {
        "uvicorn": {
          "handlers": ["default"],
          "level": "INFO",
          "propagate": false
        },
        "uvicorn.error": {
          "level": "INFO"
        },
        "uvicorn.access": {
          "handlers": ["access"],
          "level": "INFO",
          "propagate": false
        }
      },
      "root": {
        "handlers": ["default"],
        "level": "INFO"
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: __APP_NAME__
  labels:
    app.kubernetes.io/name: __APP_NAME__
    tutorial.sealos.io/run-id: __RUN_ID__
spec:
  replicas: 2
  revisionHistoryLimit: 3
  progressDeadlineSeconds: 180
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: __APP_NAME__
      tutorial.sealos.io/run-id: __RUN_ID__
  template:
    metadata:
      labels:
        app.kubernetes.io/name: __APP_NAME__
        tutorial.sealos.io/run-id: __RUN_ID__
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: __IMAGE_REFERENCE__
          imagePullPolicy: IfNotPresent
          command:
            - uvicorn
          args:
            - app.main:app
            - --host
            - 0.0.0.0
            - --port
            - "8000"
            - --workers
            - "1"
            - --log-level
            - info
            - --no-use-colors
            - --log-config
            - /etc/uvicorn/logging.json
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: __SECRET_NAME__
                  key: url
            - name: SOURCE_RELEASE
              value: "__SOURCE_RELEASE__"
            - name: IMAGE_REFERENCE
              value: "__IMAGE_REFERENCE__"
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 12
            successThreshold: 1
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: logging
              mountPath: /etc/uvicorn
              readOnly: true
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
        - name: logging
          configMap:
            name: __APP_NAME__
            items:
              - key: logging.json
                path: logging.json
---
apiVersion: v1
kind: Service
metadata:
  name: __APP_NAME__
  labels:
    app.kubernetes.io/name: __APP_NAME__
    tutorial.sealos.io/run-id: __RUN_ID__
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: __APP_NAME__
    tutorial.sealos.io/run-id: __RUN_ID__
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
