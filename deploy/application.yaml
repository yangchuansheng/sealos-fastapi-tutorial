apiVersion: apps/v1
kind: Deployment
metadata:
  name: __APP_NAME__
  labels:
    app.kubernetes.io/name: __APP_NAME__
    tutorial.sealos.io/run-id: __RUN_ID__
spec:
  replicas: 2
  revisionHistoryLimit: 3
  progressDeadlineSeconds: 180
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: __APP_NAME__
      tutorial.sealos.io/run-id: __RUN_ID__
  template:
    metadata:
      labels:
        app.kubernetes.io/name: __APP_NAME__
        tutorial.sealos.io/run-id: __RUN_ID__
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: __IMAGE_REFERENCE__
          imagePullPolicy: IfNotPresent
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: __SECRET_NAME__
                  key: url
            - name: SOURCE_RELEASE
              value: "__SOURCE_RELEASE__"
            - name: IMAGE_REFERENCE
              value: "__IMAGE_REFERENCE__"
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 12
            successThreshold: 1
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: __APP_NAME__
  labels:
    app.kubernetes.io/name: __APP_NAME__
    tutorial.sealos.io/run-id: __RUN_ID__
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: __APP_NAME__
    tutorial.sealos.io/run-id: __RUN_ID__
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
